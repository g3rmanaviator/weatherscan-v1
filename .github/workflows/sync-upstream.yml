name: Sync Upstream

on:
  schedule:
    # Runs daily at 06:00 UTC — adjust to taste
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger from Actions tab

jobs:
  sync:
    name: Sync from MistWeatherMedia/weatherscan-v1
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/MistWeatherMedia/weatherscan-v1.git || true
          git fetch upstream

      - name: Check for new upstream commits
        id: check
        run: |
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
            echo "Already up to date with upstream."
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
            echo "New upstream commits detected."
          fi

      - name: Merge upstream into main
        if: steps.check.outputs.up_to_date == 'false'
        run: |
          git merge upstream/main --no-edit --allow-unrelated-histories || {
            echo "Merge conflict detected. Aborting — manual resolution required."
            git merge --abort
            exit 1
          }

      - name: Push merged changes
        if: steps.check.outputs.up_to_date == 'false'
        run: git push origin main
